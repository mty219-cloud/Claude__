<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>TML 부식 추세 분석기</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
*{
    box-sizing:border-box;
    font-family:'Noto Sans KR', sans-serif;
}

body{
    margin:0;
    background:#1c1f26;
    color:#e5e7eb;
}

.container{
    max-width:1600px;
    margin:auto;
    padding:20px;
}

h1{
    margin-top:0;
}

.card{
    background:#2a2f3a;
    border:1px solid #3d4452;
    border-radius:12px;
    padding:18px;
    margin-bottom:20px;
}

textarea,input{
    width:100%;
    background:#16191f;
    border:1px solid #4b5563;
    color:white;
    padding:12px;
    border-radius:8px;
}

button{
    margin-top:15px;
    background:#1f6feb;
    border:none;
    color:white;
    padding:12px 24px;
    border-radius:8px;
    cursor:pointer;
    font-size:15px;
}

button:hover{
    background:#388bfd;
}

.top-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    margin-bottom:20px;
}

.bottom-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.summary-table{
    width:100%;
    border-collapse:collapse;
}

.summary-table th,
.summary-table td{
    border-bottom:1px solid #4b5563;
    padding:12px;
    text-align:center;
}

.summary-table th{
    background:#343b48;
}

canvas{
    width:100%;
    height:550px;
    background:white;
    border-radius:10px;
}

.result-table{
    width:100%;
    border-collapse:collapse;
}

.result-table th,
.result-table td{
    border-bottom:1px solid #4b5563;
    padding:10px;
    text-align:center;
}

.result-table th{
    background:#343b48;
    position:sticky;
    top:0;
}

.table-container{
    max-height:550px;
    overflow:auto;
}

.label{
    margin-bottom:8px;
    font-weight:600;
}
</style>
</head>
<body>

<div class="container">

<h1>TML 부식 추세 분석기</h1>

<div class="card">

<div class="label">CSV 입력 (TML_ID,측정일,두께mm)</div>

<textarea id="csvInput" rows="10">
TML001,2020-01-01,10.5
TML001,2021-01-01,10.2
TML001,2022-01-01,9.9
TML001,2023-01-01,9.6
TML002,2020-01-01,15
TML002,2021-01-01,14.8
TML002,2022-01-01,14.6
TML002,2023-01-01,14.3
</textarea>

<br><br>

<div class="label">최소 요구 두께(mm)</div>
<input type="number" id="minThickness" value="8">

<button onclick="analyze()">분석 실행</button>

</div>

<!-- 상단 -->
<div class="top-grid">

<div class="card">
<h3>추세기울기 | 최소요구두께 도달 예상 연도</h3>

<table class="summary-table" id="summaryTable">
<thead>
<tr>
<th>TML</th>
<th>연 부식속도(mm/년)</th>
<th>도달 예상 연도</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<div class="card">
<h3>설명</h3>

<ul>
<li>측정값을 선형 추세로 계산</li>
<li>기울기 = 연 부식속도(mm/년)</li>
<li>최소요구두께 도달 시점을 외삽</li>
<li>예상 연도는 정수로 표시</li>
</ul>

</div>

</div>

<!-- 하단 -->
<div class="bottom-grid">

<div class="card">
<h3>측정점 + 추세선</h3>
<canvas id="chart" width="750" height="550"></canvas>
</div>

<div class="card">
<h3>도달 임박순 정렬</h3>

<div class="table-container">
<table class="result-table" id="resultTable">
<thead>
<tr>
<th>TML</th>
<th>현재 두께</th>
<th>부식속도(mm/년)</th>
<th>예상 연도</th>
<th>잔여수명(년)</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

</div>

</div>

</div>

<script>

function linearRegression(points){

    let n=points.length;

    let sumX=0,sumY=0,sumXY=0,sumXX=0;

    points.forEach(p=>{
        sumX+=p.x;
        sumY+=p.y;
        sumXY+=p.x*p.y;
        sumXX+=p.x*p.x;
    });

    let slope=(n*sumXY-sumX*sumY)/(n*sumXX-sumX*sumX);

    let intercept=(sumY-slope*sumX)/n;

    return {slope,intercept};
}


function analyze(){

    let minThickness=parseFloat(document.getElementById("minThickness").value);

    let rows=document.getElementById("csvInput")
            .value.trim()
            .split("\n");

    let data={};

    rows.forEach(r=>{

        let [id,date,thk]=r.split(",");

        if(!data[id]) data[id]=[];

        data[id].push({
            date:new Date(date),
            thickness:parseFloat(thk)
        });

    });

    let summaryBody=document.querySelector("#summaryTable tbody");
    let resultBody=document.querySelector("#resultTable tbody");

    summaryBody.innerHTML="";
    resultBody.innerHTML="";

    let results=[];

    for(let id in data){

        data[id].sort((a,b)=>a.date-b.date);

        let base=data[id][0].date;

        let points=data[id].map(d=>({
            x:(d.date-base)/(365.25*24*3600*1000),
            y:d.thickness
        }));

        let lr=linearRegression(points);

        let corrosionRate=Math.abs(lr.slope);

        let last=data[id][data[id].length-1];

        let currentThickness=last.thickness;

        let currentYear=last.date.getFullYear();

        let remain=(currentThickness-minThickness)/corrosionRate;

        let reachYear=currentYear+remain;

        results.push({
            id,
            corrosionRate,
            currentThickness,
            reachYear,
            remain
        });

    }

    results.sort((a,b)=>a.reachYear-b.reachYear);

    results.forEach(r=>{

        summaryBody.innerHTML+=`
        <tr>
        <td>${r.id}</td>
        <td>${r.corrosionRate.toFixed(3)}</td>
        <td>${Math.floor(r.reachYear)}</td>
        </tr>`;

        resultBody.innerHTML+=`
        <tr>
        <td>${r.id}</td>
        <td>${r.currentThickness.toFixed(2)}</td>
        <td>${r.corrosionRate.toFixed(3)}</td>
        <td>${Math.floor(r.reachYear)}</td>
        <td>${r.remain.toFixed(1)}</td>
        </tr>`;
    });

    drawChart(data);
}



function drawChart(data){

    let canvas=document.getElementById("chart");
    let ctx=canvas.getContext("2d");

    ctx.clearRect(0,0,canvas.width,canvas.height);

    const colors=[
        "#ef4444","#3b82f6","#10b981",
        "#f59e0b","#8b5cf6","#ec4899"
    ];

    let allYears=[];
    let allThk=[];

    Object.values(data).forEach(arr=>{
        arr.forEach(d=>{
            allYears.push(d.date.getFullYear());
            allThk.push(d.thickness);
        });
    });

    let minX=Math.min(...allYears);
    let maxX=Math.max(...allYears);

    let minY=Math.min(...allThk)-1;
    let maxY=Math.max(...allThk)+1;

    let left=70;
    let bottom=500;
    let width=620;
    let height=420;

    ctx.strokeStyle="#000";
    ctx.beginPath();
    ctx.moveTo(left,50);
    ctx.lineTo(left,bottom);
    ctx.lineTo(left+width,bottom);
    ctx.stroke();

    let i=0;

    for(let id in data){

        let arr=data[id];

        let color=colors[i%colors.length];

        ctx.fillStyle=color;
        ctx.strokeStyle=color;

        ctx.beginPath();

        arr.forEach((d,index)=>{

            let x=left+(d.date.getFullYear()-minX)/(maxX-minX)*width;
            let y=bottom-(d.thickness-minY)/(maxY-minY)*height;

            if(index===0) ctx.moveTo(x,y);
            else ctx.lineTo(x,y);

            ctx.fillRect(x-4,y-4,8,8);

        });

        ctx.stroke();

        ctx.fillText(id,left+width-100,70+i*20);

        i++;

    }

}


analyze();

</script>

</body>
</html>
